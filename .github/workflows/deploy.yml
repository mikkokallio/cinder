name: Deploy Cinder

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to VM
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az vm run-command invoke \
              --resource-group cinder-rg \
              --name cinder-vm \
              --command-id RunShellScript \
              --scripts '
                set -e
                cd /opt/cinder
                git pull origin main

                # Backend
                source .venv/bin/activate
                pip install -r backend/requirements.txt --quiet

                # Frontend
                cd dashboard
                npm ci --silent
                npm run build

                # Restart services
                cd /opt/cinder
                pm2 restart ecosystem.config.js --update-env
                echo "Deploy complete: $(date)"
              '
